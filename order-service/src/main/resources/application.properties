spring.application.name=order-service
server.port=8080
management.endpoints.web.exposure.include=*

resilience4j.circuitbreaker.instances.payment-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.payment-service.slidingWindowSize=6
resilience4j.circuitbreaker.instances.payment-service.minimumNumberOfCalls=3
resilience4j.circuitbreaker.instances.payment-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.payment-service.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.payment-service.permittedNumberOfCallsInHalfOpenState=2


spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.group.enabled=true