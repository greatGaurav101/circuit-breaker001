spring.application.name=order-service
server.port=8080

# Circuit Breaker
resilience4j.circuitbreaker.instances.PaymentClientprocessPaymentLong.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.PaymentClientprocessPaymentLong.slidingWindowSize=6
#resilience4j.circuitbreaker.instances.payment-service.minimumNumberOfCalls=3
resilience4j.circuitbreaker.instances.PaymentClientprocessPaymentLong.failureRateThreshold=50
resilience4j.circuitbreaker.instances.PaymentClientprocessPaymentLong.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.PaymentClientprocessPaymentLong.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.instances.PaymentClientprocessPaymentLong.automaticTransitionFromOpenToHalfOpenEnabled=true

# Enable Feign CB
spring.cloud.openfeign.circuitbreaker.enabled=true
#spring.cloud.openfeign.circuitbreaker.group.enabled=true

#Actuator
management.endpoints.web.exposure.include=*
#management.health.circuitbreakers.enabled=true
#management.endpoint.health.show-details=ALWAYS